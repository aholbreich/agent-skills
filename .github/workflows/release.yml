name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    if: github.repository == 'aholbreich/agent-skills'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm run check
      - run: npm test
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
