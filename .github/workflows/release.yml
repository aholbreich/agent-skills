name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    if: github.repository == 'aholbreich/agent-skills'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Verify tag matches package version
        run: |
          node -e "const v=require('./package.json').version; const tag=process.env.GITHUB_REF_NAME; if (tag !== 'v' + v) { console.error(`Tag ${tag} does not match package version ${v}. Expected v${v}.`); process.exit(1); }"
      - run: npm --version
      - run: pnpm run check
      - run: pnpm test
      - run: npm pack --dry-run
      - name: Publish to npm
        run: npm publish --access public --provenance
